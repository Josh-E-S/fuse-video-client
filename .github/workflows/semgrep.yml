name: Semgrep SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    name: Static Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --error --exclude='node_modules' --exclude='.next' --exclude='electron'
        env:
          SEMGREP_RULES: >-
            p/javascript
            p/typescript
            p/react
            p/nextjs
            p/owasp-top-ten
            p/xss
